{% extends "base.html" %}
{% block content %}
<section class="section">
<div class="container">
<div class="payment-container">
<div class="payment-card">
<h1 class="payment-title">Demo Payment</h1>
<p class="payment-subtitle">This is a demo payment page. No real payment will be processed.</p>
<div class="demo-card-form">
<div class="form-group">
<label>Card Number</label>
<input type="text" class="form-input" placeholder="4242 4242 4242 4242" value="4242 4242 4242 4242" readonly>
</div>
<div class="form-grid">
<div class="form-group">
<label>Expiry Date</label>
<input type="text" class="form-input" placeholder="12/25" value="12/25" readonly>
</div>
<div class="form-group">
<label>CVV</label>
<input type="text" class="form-input" placeholder="123" value="123" readonly>
</div>
</div>
<div class="form-group">
<label>Cardholder Name</label>
<input type="text" class="form-input" placeholder="John Doe" value="John Doe" readonly>
</div>
<button id="process-payment" class="btn btn-primary btn-lg btn-block">Process Payment</button>
<p class="payment-note">Order ID: {{ order_id }}</p>
</div>
</div>
</div>
</div>
</section>
<script>
document.getElementById('process-payment').addEventListener('click', async function() {
const btn = this;
btn.disabled = true;
btn.textContent = 'Processing...';
const csrfToken = document.querySelector("meta[name='csrf-token']").content;
try {
const response = await fetch('/payment/process', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ csrf_token: csrfToken, order_id: '{{ order_id }}' })
});
const data = await response.json();
if (data.success) {
btn.textContent = 'Payment Successful!';
btn.classList.remove('btn-primary');
btn.classList.add('btn-success');
setTimeout(() => {
window.location.href = '/profile';
}, 2000);
} else {
btn.textContent = 'Payment Failed';
btn.disabled = false;
}
} catch (error) {
btn.textContent = 'Error - Try Again';
btn.disabled = false;
}
});
</script>
{% endblock %}
