{% extends "base.html" %}
{% block content %}
<section class="section">
<div class="container">
<div class="auth-container">
<div class="auth-card">
<h1 class="auth-title">Welcome Back</h1>
<p class="auth-subtitle">Sign in to your account</p>
<form method="post" class="auth-form">
<input type="hidden" name="{{ config.CSRF_FIELD }}" value="{{ csrf_token }}" />
<div class="form-group">
<label>Email</label>
<input type="email" name="email" required class="form-input" autofocus>
</div>
<div class="form-group">
<label>Password</label>
<input type="password" name="password" required class="form-input">
</div>
<button type="submit" class="btn btn-primary btn-lg btn-block">Sign In</button>
</form>
<p class="auth-footer">Don't have an account? <a href="{{ url_for('register_form') }}" class="link-primary">Sign up</a></p>
</div>
</div>
</div>
</section>
{% endblock %}
